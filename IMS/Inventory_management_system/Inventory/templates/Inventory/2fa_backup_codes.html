{% extends "Inventory/base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="text-center mb-4">
                        <i class="fas fa-key text-warning me-2"></i>
                        Backup Codes
                    </h2>
                    
                    <div class="alert alert-warning">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        <strong>Important:</strong> Save these backup codes in a safe place. Each code can only be used once.
                    </div>
                    
                    <div class="bg-light p-4 rounded mb-4">
                        <div class="row">
                            {% for token in tokens %}
                            <div class="col-md-6 mb-2">
                                <code class="fs-6">{{ token.token }}</code>
                            </div>
                            {% endfor %}
                        </div>
                    </div>
                    
                    <div class="d-flex gap-2 justify-content-center mb-3">
                        <button onclick="printCodes()" class="btn btn-outline-primary">
                            <i class="fas fa-print me-2"></i>Print
                        </button>
                        <button onclick="copyCodes()" class="btn btn-outline-primary">
                            <i class="fas fa-copy me-2"></i>Copy
                        </button>
                        <button onclick="downloadCodes()" class="btn btn-outline-primary">
                            <i class="fas fa-download me-2"></i>Download
                        </button>
                    </div>
                    
                    <form method="post" action="{% url 'regenerate_backup_codes' %}" class="text-center mb-3">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-warning" onclick="return confirm('This will invalidate your current backup codes. Are you sure?')">
                            <i class="fas fa-redo me-2"></i>Regenerate Codes
                        </button>
                    </form>
                    
                    <div class="text-center">
                        <a href="{% url 'profile' %}" class="btn btn-primary">
                            <i class="fas fa-check me-2"></i>I've Saved My Codes
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function printCodes() {
        window.print();
    }
    
    function copyCodes() {
        const codes = [{% for token in tokens %}'{{ token.token }}',{% endfor %}];
        const text = codes.join('\n');
        navigator.clipboard.writeText(text).then(() => {
            alert('Backup codes copied to clipboard!');
        });
    }
    
    function downloadCodes() {
        const codes = [{% for token in tokens %}'{{ token.token }}',{% endfor %}];
        const text = 'MOEN-IMS Backup Codes\n' +
                     '======================\n\n' +
                     codes.join('\n') +
                     '\n\nKeep these codes safe! Each can only be used once.';
        
        const blob = new Blob([text], { type: 'text/plain' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'moen-ims-backup-codes.txt';
        a.click();
        window.URL.revokeObjectURL(url);
    }
</script>
{% endblock content %}
