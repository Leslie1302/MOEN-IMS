{% extends "Inventory/base.html" %}
{% load static %}

{% block title %}Sign In — MOEGT IEPS{% endblock %}

{% block content %}
<div class="row justify-content-center py-5 fade-in">
    <div class="col-md-6 col-lg-5 col-xl-4">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <img src="https://iili.io/FsV36Yb.md.png" alt="MOEGT Logo" style="max-width: 80px;" class="mb-3">
                    <h1 class="h3 mb-2 fw-bold">Welcome Back</h1>
                    <p class="text-muted small">Sign in with your Ministry Microsoft 365 account</p>
                </div>

                <a href="{% url 'ms_login' %}" class="btn btn-outline-dark w-100 py-2 d-flex align-items-center justify-content-center gap-2">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg"
                         alt="Microsoft" style="width: 20px; height: 20px;">
                    <span class="fw-semibold">Sign in with Microsoft</span>
                </a>

                <hr class="my-4 text-muted opacity-25">

                <p class="small text-muted text-center mb-0">
                    Don't have access? Contact your IT administrator.
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
