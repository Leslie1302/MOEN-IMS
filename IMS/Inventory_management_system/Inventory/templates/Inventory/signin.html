{% extends "Inventory/base.html" %}

{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center py-5 fade-in">
    <div class="col-md-6 col-lg-5 col-xl-4">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <h1 class="h3 mb-3 fw-bold">Welcome Back</h1>
                    <p class="text-muted small">Please sign in to your account</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <small><a href="{% url 'password_reset' %}" class="text-decoration-none text-primary">Forgot
                                Password?</a></small>
                    </div>

                    <button class="btn btn-primary w-100 py-2" type="submit">
                        Sign In <i class="bi bi-box-arrow-in-right ms-2"></i>
                    </button>
                </form>

                <hr class="my-4 text-muted opacity-25">

                <div class="text-center">
                    <p class="small text-muted mb-0">Don't have an account? <a href="{% url 'signup' %}"
                            class="text-primary text-decoration-none fw-bold">Create Account</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
